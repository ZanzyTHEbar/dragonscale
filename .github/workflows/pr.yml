name: pr-check

on:
  pull_request:

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code || (echo "::error::Code is not formatted. Run 'make fmt' and commit the changes." && exit 1)

  sqlc-check:
    runs-on: ubuntu-latest
    needs: fmt-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Check sqlc generated code
        run: make sqlc-check

      - name: Run sqlc vet rules
        run: make sqlc-vet

  # Verify FlatBuffers generation is idempotent for current tree state.
  flatc-check:
    runs-on: ubuntu-latest
    needs: fmt-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install pinned flatc
        run: |
          bash scripts/install-flatc.sh "$RUNNER_TEMP/flatc-bin"
          echo "$RUNNER_TEMP/flatc-bin" >> "$GITHUB_PATH"

      - name: Check FlatBuffers generated code
        run: make flatc-check

  vet:
    runs-on: ubuntu-latest
    needs: [fmt-check, flatc-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install pinned flatc
        run: |
          bash scripts/install-flatc.sh "$RUNNER_TEMP/flatc-bin"
          echo "$RUNNER_TEMP/flatc-bin" >> "$GITHUB_PATH"

      - name: Run go generate
        run: go generate ./...

      - name: Run go vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    needs: [fmt-check, flatc-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install pinned flatc
        run: |
          bash scripts/install-flatc.sh "$RUNNER_TEMP/flatc-bin"
          echo "$RUNNER_TEMP/flatc-bin" >> "$GITHUB_PATH"

      - name: Run go generate
        run: go generate ./...

      - name: Run go test with race detector
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Write coverage summary
        if: always()
        shell: bash
        run: |
          if [ -f coverage.txt ]; then
            go tool cover -func=coverage.txt | tee coverage-summary.txt
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            coverage.txt
            coverage-summary.txt
          if-no-files-found: warn

  eval-proof:
    runs-on: ubuntu-latest
    needs: [fmt-check, flatc-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run eval smoke proof
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p eval/results
          SKIP_DEVCONTAINER_WRAPPER=1 make DEVCONTAINER_EXEC= eval-test 2>&1 | tee eval/results/eval-test.log

      - name: Upload eval smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: eval/results/eval-test.log
          if-no-files-found: error

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: make test-integration
