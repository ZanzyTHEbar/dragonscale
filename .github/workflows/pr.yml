name: pr-check

on:
  pull_request:

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code || (echo "::error::Code is not formatted. Run 'make fmt' and commit the changes." && exit 1)

  sqlc-check:
    runs-on: ubuntu-latest
    needs: fmt-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Check sqlc generated code
        run: make sqlc-check

      - name: Run sqlc vet rules
        run: make sqlc-vet

  # Verify FlatBuffers generation is idempotent for current tree state.
  flatc-check:
    runs-on: ubuntu-latest
    needs: fmt-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install flatc
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler

      - name: Check FlatBuffers generated code
        run: make flatc-check

  vet:
    runs-on: ubuntu-latest
    needs: [fmt-check, flatc-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install flatc
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler

      - name: Run go generate
        run: go generate ./...

      - name: Run go vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    needs: [fmt-check, flatc-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install flatc
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler

      - name: Run go generate
        run: go generate ./...

      - name: Run go test with race detector
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Print coverage summary
        if: always()
        run: go tool cover -func=coverage.txt | tail -1

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: make test-integration
