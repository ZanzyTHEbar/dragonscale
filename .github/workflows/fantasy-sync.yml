name: fantasy-sdk-sync-check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Read current vendored version
        id: current
        run: |
          if [[ -f internal/fantasy/.vendor-version ]]; then
            echo "version=$(cat internal/fantasy/.vendor-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "version=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Query latest upstream version
        id: latest
        run: |
          LATEST=$(go list -m -versions charm.land/fantasy 2>/dev/null \
            | awk '{$1=""; print}' | tr ' ' '\n' | grep -v '^\s*$' | tail -1)
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          echo "current=${CURRENT}"
          echo "latest=${LATEST}"
          if [[ "$CURRENT" == "$LATEST" ]]; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate diff summary
        if: steps.compare.outputs.behind == 'true'
        id: diff
        run: |
          TARGET="${{ steps.latest.outputs.version }}"
          go mod download "charm.land/fantasy@${TARGET}" >/dev/null 2>&1
          CACHE_DIR="$(go env GOMODCACHE)/charm.land/fantasy@${TARGET}"

          DIFF_STAT=$(git diff --no-index --stat -- internal/fantasy/ "${CACHE_DIR}" 2>/dev/null || true)
          echo "stat<<EOF" >> "$GITHUB_OUTPUT"
          echo "${DIFF_STAT}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for existing issue
        if: steps.compare.outputs.behind == 'true'
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="P2: Fantasy SDK — upstream ${{ steps.latest.outputs.version }} available"
          EXISTING=$(gh issue list --search "in:title \"${TITLE}\"" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Issue #${EXISTING} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub issue
        if: steps.compare.outputs.behind == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          DIFF_STAT="${{ steps.diff.outputs.stat }}"
          TITLE="P2: Fantasy SDK — upstream ${LATEST} available (current: ${CURRENT})"

          cat > /tmp/issue-body.md <<ISSUE_EOF
          ## Fantasy SDK upstream update available

          | | Version |
          |---|---------|
          | **Vendored** | \`${CURRENT}\` |
          | **Latest**   | \`${LATEST}\` |

          ### Diff summary

          \`\`\`
          ${DIFF_STAT}
          \`\`\`

          ### How to sync

          \`\`\`bash
          make fantasy-diff FANTASY_VERSION=${LATEST}   # preview changes
          make fantasy-sync FANTASY_VERSION=${LATEST}   # apply sync + re-apply patches
          \`\`\`

          After syncing:
          1. Review the diff: \`git diff\`
          2. Run full test suite: \`go test ./...\`
          3. Commit: \`git add -A && git commit -m "build(fantasy): sync vendored SDK to ${LATEST}"\`

          ---
          *Auto-generated by fantasy-sdk-sync-check workflow.*
          ISSUE_EOF

          gh issue create \
            --title "${TITLE}" \
            --body-file /tmp/issue-body.md \
            --label enhancement \
            --assignee "@me"
