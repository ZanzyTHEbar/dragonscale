version: "2"
sql:
  - engine: "sqlite"
    queries: "queries/"
    schema: "schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "."
        sql_package: "database/sql"
        emit_json_tags: true
        emit_db_tags: true
        json_tags_case_style: "snake"
        emit_empty_slices: true
        emit_interface: true
        emit_exported_queries: true
        emit_sql_as_comment: true
        emit_pointers_for_null_types: true
        # NOTE: emit_prepared_queries is intentionally omitted.
        # go-libsql rejects sqlc's ?1/?2 positional params during PrepareContext.
        # The manual stmtCache handles preparation for hand-written queries.
        omit_unused_structs: true
        query_parameter_limit: 0
        initialisms: ["id", "url", "api", "sql", "fts", "uuid"]
        overrides:
          # Entity IDs: UUIDv7 via ids.UUID (BLOB storage with Valuer/Scanner)
          # Only entity-owned PKs and their FKs — NOT agent_id/session_key (external identifiers)
          - column: "recall_items.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "archival_chunks.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "archival_chunks.recall_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "memory_summaries.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_documents.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_audit_log.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent conversations
          - column: "agent_conversations.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent messages
          - column: "agent_messages.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_messages.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent runs
          - column: "agent_runs.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_runs.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent run states
          - column: "agent_run_states.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_run_states.run_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent state transitions
          - column: "agent_state_transitions.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_state_transitions.run_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent checkpoints
          - column: "agent_checkpoints.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_checkpoints.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_checkpoints.run_state_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Agent tool results
          - column: "agent_tool_results.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_tool_results.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_tool_results.run_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Jobs
          - column: "jobs.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Map operator runs/items
          - column: "map_runs.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "map_items.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "map_items.run_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Conversation forks
          - column: "agent_conversation_forks.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_conversation_forks.parent_conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_conversation_forks.child_conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_conversation_forks.checkpoint_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Conversation links
          - column: "agent_conversation_links.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_conversation_links.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_conversation_links.linked_conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Threads
          - column: "agent_threads.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_threads.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Thread messages
          - column: "agent_thread_messages.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_thread_messages.thread_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Mentions
          - column: "agent_mentions.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_mentions.conversation_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_mentions.message_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_mentions.target_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Message revisions
          - column: "agent_message_revisions.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "agent_message_revisions.message_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # DAG
          - column: "dag_snapshots.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "dag_nodes.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "dag_nodes.snapshot_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "dag_edges.id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "dag_edges.snapshot_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "dag_edges.parent_node_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          - column: "dag_edges.child_node_id"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/ids"
              type: "UUID"
          # Domain type: recall_items.sector → memory.Sector
          - column: "recall_items.sector"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/memory"
              type: "Sector"
          # F32_BLOB: archival_chunks.embedding → memory.Embedding
          # Implements driver.Valuer/sql.Scanner for transparent blob↔float32 conversion.
          # Empty embeddings serialize as SQL NULL (not 0-byte blob).
          - column: "archival_chunks.embedding"
            go_type:
              import: "github.com/ZanzyTHEbar/dragonscale/pkg/memory"
              type: "Embedding"
          # Timestamp types → time.Time (consistent with go-libsql DATETIME handling)
          - db_type: "DATETIME"
            go_type: "time.Time"
          - db_type: "TIMESTAMP"
            go_type: "time.Time"
          # Boolean → bool
          - db_type: "BOOLEAN"
            go_type: "bool"
          # JSON/JSONB → json.RawMessage (future JSON storage columns)
          - db_type: "JSON"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "JSONB"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
    rules:
      - no-unbounded-delete
      - one-select-requires-limit-1
rules:
  - name: no-unbounded-delete
    message: "DELETE statements must include a WHERE clause"
    rule: >
      query.sql.contains("DELETE") && !query.sql.contains("WHERE")
  - name: one-select-requires-limit-1
    message: ":one SELECT queries must include LIMIT 1 (except aggregates)"
    rule: >
      query.cmd == "one"
      && query.sql.contains("SELECT")
      && !query.sql.contains("LIMIT 1")
      && !query.sql.contains("COUNT(")
