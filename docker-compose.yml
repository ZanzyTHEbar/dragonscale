services:
  # ─────────────────────────────────────────────
  # DragonScale Agent (one-shot query)
  #   docker compose run --rm dragonscale-agent -m "Hello"
  # ─────────────────────────────────────────────
  dragonscale-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dragonscale-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/home/dragonscale/.dragonscale/config.json:ro
      - dragonscale-workspace:/home/dragonscale/.dragonscale/workspace
    entrypoint: ["dragonscale", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # DragonScale Gateway (Long-running Bot)
  #   docker compose up dragonscale-gateway
  # ─────────────────────────────────────────────
  dragonscale-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dragonscale-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/home/dragonscale/.dragonscale/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - dragonscale-workspace:/home/dragonscale/.dragonscale/workspace
    command: ["gateway"]

volumes:
  dragonscale-workspace:
